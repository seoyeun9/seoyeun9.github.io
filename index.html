<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to Yoonland</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 스크롤 방지 */
        }
        
        .portfolio-container {
            width: 100vw;
            height: 100vh;
            background-image: url('Image/배경.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        
        .modal { display: none; }
    </style>
</head>
<body>

<main class="portfolio-container">
    <article class="cv-paper" id="cv-trigger">
        <img src="Image/CV.png" class="CV-img" alt="Seoyeun Oh CV">
        <img src="Image/id_card.png" class="id_card-img" alt="ID Card">
    </article>

    <section class="project-grid">
        <div class="project-item brand">
            <a href="brand-detail.html">
                <img src="Image/브랜드_이미지.png" class="브랜드_main" alt="Brand Project">
                <img src="Image/브랜드_포스트잇.png" class="브랜드_포스트잇" alt="Post-it">
            </a>
        </div>
        <div class="project-item visual">
            <a href="visual-detail.html">
                <img src="Image/비주얼_이미지.png" class="비주얼_main" alt="Visual Project">
                <img src="Image/비주얼_포스트잇.png" class="비주얼_포스트잇" alt="Post-it">
            </a>
        </div>
        <div class="project-item interact">
            <a href="interact-detail.html">
                <img src="Image/인터랙트_이미지.png" class="인터랙트_main" alt="Interact Project">
                <img src="Image/인터랙트_포스트잇.png" class="인터랙트_포스트잇" alt="Post-it">
            </a>
        </div>
    </section>

    <div id="cv-modal" class="modal">
        <span class="close-button">&times;</span>
        <img src="Image/CV.png" class="modal-content">
    </div>
</main>

</body>
</html>
