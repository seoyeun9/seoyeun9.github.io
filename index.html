    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to Yoonland</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .portfolio-container {
            width: 100vw;
            height: 62.5vw;
            margin: 0 auto;
            
            background-image: url('Image/background.png'); 
            background-size: calc(1457 / 1728 * 100vw) calc(929 / 1728 * 100vw);
            background-position: calc(46 / 1728 * 100vw) calc(11 / 1728 * 100vw);
            background-repeat: no-repeat;
            position: relative;
            background-color: #f0f0f0;
        }

        .CV-img {
            position: absolute;
            left: calc(100 / 1728 * 100vw);
            top: calc(-1 / 1728 * 100vw);
            width: calc(670 / 1728 * 100vw); /* 피그마 W 값 */
            z-index: 5;
            display: block;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.3)); /* 그림자 */
        }
        .id_card-img {
            position: absolute;
            left: calc(-223 / 1728 * 100vw);
            top: calc(-970 / 1728 * 100vw);
            width: calc(848 / 1728 * 100vw); /* 피그마 W 값 */
            z-index: 10;  /* CV보다 위로 */
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.3));
        }

        .project-item {
            position: absolute;
        }

        .project-item img {
            position: absolute;
            display: block;
        }

        /* --- Brand 영역 --- */
        .brand {
            left: calc(753 / 1728 * 100vw);
            top: calc(26 / 1728 * 100vw);
        }
            .brand .image {
                width: calc(605 / 1728 * 100vw);
                z-index: 2;
                filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.3));
            }
            .brand .postit {
                width: calc(200 / 1728 * 100vw);
                left: calc(-52 / 1728 * 100vw);
                top: calc(-3 / 1728 * 100vw);
                z-index: 3;
                filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.3));
            }
         /* --- Visual 영역 --- */
        .visual {
            left: calc(781 / 1728 * 100vw);
            top: calc(386 / 1728 * 100vw);
        }
            .visual .image {
                width: calc(305 / 1728 * 100vw);
                z-index: 2;
                filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.3));
            }
            .visual .postit {
                width: calc(200 / 1728 * 100vw);
                left: calc(153 / 1728 * 100vw);
                top: calc(5 / 1728 * 100vw);
                z-index: 3;
                filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.3));
            }
        /* --- Interact 영역 --- */
        .interact {
            left: calc(923 / 1728 * 100vw);
            top: calc(546 / 1728 * 100vw);
        }
            .interact .photo {
                width: calc(319 / 1728 * 100vw);
                z-index: 2;
                filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.3));
            }
            .interact .postit {
                width: calc(200 / 1728 * 100vw);
                left: calc(-191 / 1728 * 100vw);
                top: calc(-175 / 1728 * 100vw);
                z-index: 3;
                filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.3));
            }
        .modal { display: none; }
    </style>
</head>
<body>

<main class="portfolio-container">
    <article class="cv-paper" id="cv-trigger">
        <img src="Image/CV.png" class="CV-img" alt="Seoyeun Oh CV">
        <img src="Image/id_card.png" class="id_card-img" alt="ID Card">
    </article>

    <section class="project-grid">
        <div class="project-item brand">
            <a href="brand-detail.html">
                <img src="Image/brand_image.png" class="brand_main" alt="Brand Project">
                <img src="Image/brand_postit.png" class="brand_postit" alt="Post-it">
            </a>
        </div>
        <div class="project-item visual">
            <a href="visual-detail.html">
                <img src="Image/visual_image.png" class="visual_main" alt="Visual Project">
                <img src="Image/visual_postit.png" class="visual_postit" alt="Post-it">
            </a>
        </div>
        <div class="project-item interact">
            <a href="interact-detail.html">
                <img src="Image/interact_image.png" class="interact_main" alt="Interact Project">
                <img src="Image/interact_postit.png" class="interact_postit" alt="Post-it">
            </a>
        </div>
    </section>

    <div id="cv-modal" class="modal">
        <span class="close-button">&times;</span>
        <img src="Image/CV.png" class="modal-content">
    </div>
</main>

</body>
</html>
